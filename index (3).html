<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Match</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">

<h1>🏓 Match</h1>
<div class="subtitle">Rouge 🔴 vs Bleu 🔵</div>

<div class="board">

<div class="team red">
<h2>Camp Rouge</h2>
<div class="score" id="scoreRed">0</div>
<div class="smash">Smash : <span id="smashRed">0</span></div>

<button class="smashBtn" onclick="smash('red')">💥 SMASH</button>
<button class="pointBtn" onclick="point('red')">+1 POINT</button>
</div>

<div class="team blue">
<h2>Camp Bleu</h2>
<div class="score" id="scoreBlue">0</div>
<div class="smash">Smash : <span id="smashBlue">0</span></div>

<button class="smashBtn" onclick="smash('blue')">💥 SMASH</button>
<button class="pointBtn" onclick="point('blue')">+1 POINT</button>
</div>

</div>

<div id="winner" class="winner"></div>

<button class="reset" onclick="resetGame()">🔄 Nouvelle manche</button>

</div>

<script src="script.js"></script>

</body>
</html>
